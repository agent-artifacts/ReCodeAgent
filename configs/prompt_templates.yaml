      |----------|------------------|------------------|---------------|---------------|------------|
      | func_name | file_generated.ext | file_generated.ext | PASS | PASS | YES |
      | func_name2 | file_generated.ext | file_generated.ext | PASS | FAIL | NO - BUG |

      **Action Required for non-equivalent results:** Fix the {{ target_language }} implementation to match {{ source_language }} behavior.

      ---

      ## Next Steps
      [If issues found]: The Translator agent must repair all issues listed above.
      [If no issues]: Translation is complete and verified.
