      The test-generator-executor subagent will create test files with the following exact naming:
      - {{ source_language.upper() }}: `ClassNameTest_generated.<source_ext>` in {{ source_project_root }}
      - {{ target_language.upper() }}: `ClassNameTest_generated.<target_ext>` in {{ target_translation_root }}
      - Example: For class `Utils`, create `UtilsTest_generated.py` (source) and `UtilsTest_generated.js` (target)
